<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sleuth — hero</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;800&display=swap');
  html, body { margin: 0; padding: 0; }
  body {
    width: 1600px;
    height: 840px;
    background:
      radial-gradient(ellipse at 50% 45%, rgba(40, 70, 140, 0.35) 0%, rgba(0,0,0,0) 60%),
      radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0) 40%, rgba(0,0,0,0.55) 100%),
      linear-gradient(135deg, #0b1430 0%, #070b1f 55%, #04060f 100%);
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    color: #fff;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  /* subtle grain via layered radial dots */
  body::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      radial-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
    pointer-events: none;
  }
  .watermark {
    position: absolute;
    top: 40px; left: 56px;
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 18px;
    letter-spacing: 0.14em;
    color: rgba(255,255,255,0.12);
    text-transform: uppercase;
  }
  .watermark .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ff6b3d;
    box-shadow: 0 0 12px #ff6b3d;
    margin-right: 12px;
    vertical-align: middle;
    opacity: 0.6;
  }
  .wordmark {
    display: flex;
    align-items: center;
    gap: 36px;
    z-index: 2;
  }
  .wordmark svg {
    width: 140px;
    height: 140px;
    filter: drop-shadow(0 6px 30px rgba(120, 170, 255, 0.15));
  }
  .wordmark h1 {
    margin: 0;
    font-size: 200px;
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 0.9;
    color: #fff;
    text-shadow: 0 4px 60px rgba(120, 170, 255, 0.18);
  }
  .tagline {
    margin-top: 40px;
    font-size: 44px;
    font-weight: 400;
    letter-spacing: 0.015em;
    color: rgba(255,255,255,0.78);
    z-index: 2;
    text-align: center;
  }
  .tagline em {
    font-style: normal;
    color: #fff;
    font-weight: 500;
  }
  .footer-line {
    position: absolute;
    bottom: 52px;
    left: 0; right: 0;
    text-align: center;
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 16px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
    z-index: 2;
  }
</style>
</head>
<body>
  <div class="watermark"><span class="dot"></span>case_file_001 · open</div>

  <div class="wordmark">
    <svg viewBox="0 0 100 100" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="40" cy="40" r="26"/>
      <circle cx="40" cy="40" r="18" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
      <line x1="60" y1="60" x2="86" y2="86"/>
      <line x1="56" y1="64" x2="82" y2="90" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    </svg>
    <h1>Sleuth</h1>
  </div>

  <div class="tagline">Harness the power of <em>Recursive Language Models</em></div>

  <div class="footer-line">log files · root cause · 90 seconds</div>
</body>
</html>
